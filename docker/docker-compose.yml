# ─── Skills Hub Docker Compose ───
# app + postgres + minio (v1: no Redis)

services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skills_hub
      POSTGRES_USER: skillshub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-skillshub}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillshub -d skills_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ──
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js App ──
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skillshub:${POSTGRES_PASSWORD:-skillshub}@postgres:5432/skills_hub?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-skills-hub}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin}
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL}
      SEED_OWNER_NAME: ${SEED_OWNER_NAME}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD}
      NODE_ENV: production
    ports:
      - "3000:3000"
    command: >
      sh -c "
        npx prisma migrate deploy &&
        npx tsx prisma/seed.ts &&
        npx next start
      "

volumes:
  postgres_data:
  minio_data:
