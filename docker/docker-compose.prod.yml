# ─── Skills Hub Production Docker Compose ───
# Uses pre-built image from GHCR. Used by CD pipeline.
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: skills_hub
      POSTGRES_USER: skillshub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillshub -d skills_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/${GITHUB_OWNER:-jiangfire}/skills-hub:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://skillshub:${POSTGRES_PASSWORD}@postgres:5432/skills_hub?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-skills-hub}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL}
      SEED_OWNER_NAME: ${SEED_OWNER_NAME}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD}
      NODE_ENV: production
    command: >
      sh -c "
        npx prisma migrate deploy &&
        node prisma/seed.js &&
        node server.js
      "

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - app

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
