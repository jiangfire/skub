name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: skills_hub_test
          POSTGRES_USER: skillshub
          POSTGRES_PASSWORD: skillshub
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skillshub -d skills_hub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://skillshub:skillshub@localhost:5432/skills_hub_test?schema=public
      JWT_SECRET: ci-test-secret
      JWT_EXPIRES_IN: 1h

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
